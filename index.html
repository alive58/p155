<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحدّي التركيز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ===== THEMES ===== */
  :root[data-theme="dark"] {
    --bg: #0a0f0d;
    --surface: #111a15;
    --surface2: #1a2620;
    --accent: #00e5a0;
    --accent2: #00b87a;
    --text: #e8f5ee;
    --muted: #5a7a68;
    --danger: #ff4d6d;
    --warn: #ffa94d;
    --glow: rgba(0,229,160,0.18);
    --glow-strong: rgba(0,229,160,0.35);
    --card-border: rgba(0,229,160,0.08);
  }
  :root[data-theme="ocean"] {
    --bg: #050d1a;
    --surface: #0d1e35;
    --surface2: #162d4e;
    --accent: #00c8ff;
    --accent2: #0099cc;
    --text: #e0f4ff;
    --muted: #4a7fa0;
    --danger: #ff4d6d;
    --warn: #ffa94d;
    --glow: rgba(0,200,255,0.18);
    --glow-strong: rgba(0,200,255,0.35);
    --card-border: rgba(0,200,255,0.08);
  }
  :root[data-theme="sunset"] {
    --bg: #0f080a;
    --surface: #1f1015;
    --surface2: #2e1820;
    --accent: #ff6b9d;
    --accent2: #e0477a;
    --text: #ffe8f0;
    --muted: #8a5060;
    --danger: #ff4d6d;
    --warn: #ffa94d;
    --glow: rgba(255,107,157,0.18);
    --glow-strong: rgba(255,107,157,0.35);
    --card-border: rgba(255,107,157,0.08);
  }
  :root[data-theme="purple"] {
    --bg: #08060f;
    --surface: #110e1e;
    --surface2: #1c1830;
    --accent: #a855f7;
    --accent2: #8b33e0;
    --text: #ede8ff;
    --muted: #5a4a80;
    --danger: #ff4d6d;
    --warn: #ffa94d;
    --glow: rgba(168,85,247,0.18);
    --glow-strong: rgba(168,85,247,0.35);
    --card-border: rgba(168,85,247,0.08);
  }
  :root[data-theme="gold"] {
    --bg: #0d0b06;
    --surface: #1a1508;
    --surface2: #2a2210;
    --accent: #f0c040;
    --accent2: #d4a020;
    --text: #fff8e0;
    --muted: #7a6830;
    --danger: #ff4d6d;
    --warn: #ffa94d;
    --glow: rgba(240,192,64,0.18);
    --glow-strong: rgba(240,192,64,0.35);
    --card-border: rgba(240,192,64,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    position: relative;
    overflow-x: hidden;
    transition: background 0.4s, color 0.4s;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    transition: background 0.4s;
  }

  /* ===== TOP BAR ===== */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    background: rgba(10,15,13,0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 50;
    transition: background 0.4s, border 0.4s;
  }

  .top-bar-left { display: flex; align-items: center; gap: 10px; }

  .user-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    object-fit: cover;
    box-shadow: 0 0 10px var(--glow);
    transition: border 0.4s, box-shadow 0.4s;
  }
  .user-avatar-placeholder {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--surface2);
    border: 2px solid var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .user-name {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .top-bar-right { display: flex; align-items: center; gap: 8px; }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--surface2);
    color: var(--muted);
    padding: 7px;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.25s;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--glow); }

  .auth-btn {
    padding: 7px 14px;
    background: var(--surface);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 9px;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .auth-btn:hover { background: var(--accent); color: var(--bg); }
  .auth-btn.signout { border-color: var(--danger); color: var(--danger); }
  .auth-btn.signout:hover { background: var(--danger); color: #fff; }

  /* ===== THEME PANEL ===== */
  .theme-panel {
    position: fixed;
    top: 68px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: var(--surface);
    border: 1px solid var(--surface2);
    border-radius: 14px;
    padding: 12px 16px;
    display: none;
    gap: 10px;
    align-items: center;
    z-index: 49;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
  }
  .theme-panel.show {
    display: flex;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .theme-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2.5px solid transparent;
    transition: all 0.2s;
    position: relative;
  }
  .theme-swatch:hover, .theme-swatch.active { border-color: white; transform: scale(1.15); }
  .theme-swatch[data-t="dark"]   { background: #00e5a0; }
  .theme-swatch[data-t="ocean"]  { background: #00c8ff; }
  .theme-swatch[data-t="sunset"] { background: #ff6b9d; }
  .theme-swatch[data-t="purple"] { background: #a855f7; }
  .theme-swatch[data-t="gold"]   { background: #f0c040; }
  .theme-label { font-size: 0.75rem; color: var(--muted); white-space: nowrap; }

  /* ===== MAIN CONTAINER ===== */
  .container {
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    margin-top: 76px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeDown 0.6s ease both;
  }
  .header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
  .header h1 span { color: var(--accent); transition: color 0.4s; }
  .header p { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }

  .tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    background: var(--surface);
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 20px;
    animation: fadeUp 0.5s ease 0.1s both;
    border: 1px solid var(--card-border);
  }
  .tab {
    padding: 10px;
    text-align: center;
    border-radius: 11px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.25s;
    user-select: none;
  }
  .tab.active {
    background: var(--accent);
    color: #0a0f0d;
    box-shadow: 0 0 16px var(--glow);
  }

  .durations {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease 0.15s both;
  }
  .dur-btn {
    padding: 8px 16px;
    border-radius: 10px;
    background: var(--surface);
    border: 1.5px solid transparent;
    color: var(--muted);
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
  }
  .dur-btn:hover { border-color: var(--accent); color: var(--accent); }
  .dur-btn.active { border-color: var(--accent); background: rgba(0,229,160,0.1); color: var(--accent); }

  .custom-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease 0.2s both;
  }
  .custom-row input {
    flex: 1;
    padding: 9px 14px;
    background: var(--surface);
    border: 1.5px solid var(--surface2);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: 'Tajawal', sans-serif;
    outline: none;
    text-align: right;
    transition: border 0.2s;
  }
  .custom-row input:focus { border-color: var(--accent); }
  .custom-row input::placeholder { color: var(--muted); }
  .custom-row button {
    padding: 9px 18px;
    background: var(--surface2);
    border: 1.5px solid var(--surface2);
    border-radius: 10px;
    color: var(--text);
    font-weight: 700;
    cursor: pointer;
    font-size: 0.88rem;
    font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
  }
  .custom-row button:hover { border-color: var(--accent); color: var(--accent); }

  .break-settings {
    background: var(--surface);
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    display: none;
    gap: 10px;
    align-items: center;
    border: 1px solid var(--surface2);
  }
  .break-settings.show { display: flex; }
  .break-settings label { font-size: 0.8rem; color: var(--muted); }
  .break-settings input {
    width: 50px;
    background: var(--surface2);
    border: 1px solid transparent;
    border-radius: 6px;
    padding: 4px;
    color: var(--accent);
    text-align: center;
    font-family: 'Tajawal', sans-serif;
    outline: none;
  }

  .pomo-info { display: none; text-align: center; margin-bottom: 10px; color: var(--muted); }
  .pomo-info.show { display: block; }
  .pomo-dots { display: flex; justify-content: center; gap: 6px; margin-top: 6px; }
  .pomo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--surface2); transition: background 0.3s; }
  .pomo-dot.done { background: var(--accent); }
  .pomo-dot.current { background: var(--warn); }

  .timer-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    animation: fadeUp 0.5s ease 0.25s both;
  }
  .timer-circle { position: relative; width: 220px; height: 220px; }
  .timer-circle svg {
    position: absolute;
    top: 0; left: 0;
    transform: rotate(-90deg);
  }
  .timer-circle svg circle { fill: none; stroke-width: 6; stroke-linecap: round; }
  .circle-bg { stroke: var(--surface2); }
  .circle-prog {
    stroke: var(--accent);
    stroke-dasharray: 628;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.4s;
  }
  .timer-inner {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .timer-display { font-size: 3rem; font-weight: 900; transition: color 0.4s; }
  .timer-phase { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }

  .start-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    border: none;
    border-radius: 16px;
    color: #0a0f0d;
    font-size: 1.15rem;
    font-weight: 800;
    cursor: pointer;
    font-family: 'Tajawal', sans-serif;
    box-shadow: 0 4px 24px var(--glow-strong);
    margin-bottom: 20px;
    transition: background 0.25s, box-shadow 0.4s;
  }
  .start-btn.running { background: var(--danger); box-shadow: 0 4px 24px rgba(255,77,109,0.3); }
  .start-btn:active { transform: scale(0.98); }

  .stats-card, .task-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 12px;
    border: 1px solid var(--card-border);
    transition: border 0.4s, background 0.4s;
  }
  .stats-value { font-size: 1.15rem; font-weight: 800; color: var(--accent); transition: color 0.4s; }
  .task-card input {
    width: 100%;
    background: var(--surface2);
    border: none;
    border-radius: 10px;
    padding: 9px 12px;
    color: var(--text);
    text-align: right;
    outline: none;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.9rem;
    transition: background 0.4s;
  }
  .task-card input::placeholder { color: var(--muted); }

  /* ===== HISTORY PANEL ===== */
  .history-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 12px;
    border: 1px solid var(--card-border);
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .history-title { font-size: 0.9rem; font-weight: 700; color: var(--text); }
  .history-clear {
    font-size: 0.75rem;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid transparent;
    background: transparent;
    font-family: 'Tajawal', sans-serif;
    transition: all 0.2s;
  }
  .history-clear:hover { border-color: var(--danger); color: var(--danger); }
  .history-list { display: flex; flex-direction: column; gap: 6px; max-height: 180px; overflow-y: auto; }
  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    background: var(--surface2);
    border-radius: 9px;
    font-size: 0.82rem;
  }
  .history-item-task { color: var(--text); flex: 1; }
  .history-item-meta { color: var(--muted); font-size: 0.75rem; text-align: left; }
  .history-empty { color: var(--muted); font-size: 0.82rem; text-align: center; padding: 12px 0; }

  /* ===== OVERLAYS ===== */
  .blocker, .break-overlay, .done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .blocker.show, .break-overlay.show, .done-overlay.show { display: flex; }

  .blocker-quit, .done-btn, .break-skip-btn {
    margin-top: 20px;
    padding: 12px 32px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .done-btn, .break-skip-btn {
    background: var(--accent);
    border: none;
    color: #0a0f0d;
    box-shadow: 0 4px 20px var(--glow);
  }
  .blocker-quit {
    background: transparent;
    border: 1.5px solid var(--surface2);
    color: var(--muted);
  }
  .blocker-quit:hover { border-color: var(--danger); color: var(--danger); }

  /* ===== SYNC STATUS ===== */
  .sync-badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(0,229,160,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,229,160,0.2);
    transition: all 0.4s;
  }
  .sync-badge.offline { background: rgba(90,122,104,0.1); color: var(--muted); border-color: transparent; }

  /* ===== AUTH LOADING ===== */
  .auth-loading {
    display: flex; align-items: center; gap: 6px;
  }
  .auth-spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--surface2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }

  .pulsing { animation: pulse 1.5s ease-in-out infinite; }

  /* Scrollbar */
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ===== TOP BAR ===== -->
<div class="top-bar">
  <div class="top-bar-left" id="user-section">
    <div class="auth-loading" id="auth-loading">
      <div class="auth-spinner"></div>
    </div>
  </div>
  <div class="top-bar-right">
    <span class="sync-badge offline" id="sync-badge">⚫ غير متصل</span>
    <button class="icon-btn" onclick="toggleThemePanel()" title="تغيير الثيم" id="theme-toggle-btn">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
    </button>
    <button class="icon-btn" onclick="toggleFullscreen()" title="شاشة كاملة">
      <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </button>
  </div>
</div>

<!-- ===== THEME PANEL ===== -->
<div class="theme-panel" id="theme-panel">
  <span class="theme-label">الثيم:</span>
  <div class="theme-swatch active" data-t="dark"   title="أخضر (افتراضي)" onclick="setTheme('dark')"></div>
  <div class="theme-swatch"        data-t="ocean"  title="أزرق محيطي"     onclick="setTheme('ocean')"></div>
  <div class="theme-swatch"        data-t="sunset" title="وردي غروب"       onclick="setTheme('sunset')"></div>
  <div class="theme-swatch"        data-t="purple" title="بنفسجي"          onclick="setTheme('purple')"></div>
  <div class="theme-swatch"        data-t="gold"   title="ذهبي"            onclick="setTheme('gold')"></div>
</div>

<!-- ===== MAIN CONTAINER ===== -->
<div class="container">
  <div class="header">
    <h1>🎯 تحدّي <span>التركيز</span></h1>
    <p>ضع جوالك على الطاولة وابدأ</p>
  </div>

  <div class="tabs">
    <div class="tab" id="tab-pomo" onclick="setMode('pomo')">🍅 بومودورو</div>
    <div class="tab active" id="tab-free" onclick="setMode('free')">⏱️ مؤقت حر</div>
  </div>

  <div class="durations" id="dur-row">
    <button class="dur-btn" onclick="setDur(5)">5 دقائق</button>
    <button class="dur-btn" onclick="setDur(10)">10 دقائق</button>
    <button class="dur-btn" onclick="setDur(25)">25 دقيقة</button>
    <button class="dur-btn active" onclick="setDur(1)">1 دقيقة</button>
    <button class="dur-btn" onclick="setDur(45)">45 دقيقة</button>
  </div>

  <div class="custom-row">
    <button onclick="applyCustom()">تطبيق</button>
    <input type="number" id="custom-input" placeholder="وقت مخصص (بالدقائق)" min="1">
  </div>

  <div class="break-settings" id="break-settings">
    <label>☕ استراحة (د):</label>
    <input type="number" id="pomo-break-input" value="5">
    <label>☕ طويلة (د):</label>
    <input type="number" id="pomo-long-break-input" value="15">
  </div>

  <div class="pomo-info" id="pomo-info">
    <div id="pomo-phase-label">جلسة تركيز 1 / 4</div>
    <div class="pomo-dots" id="pomo-dots"></div>
  </div>

  <div class="timer-wrap">
    <div class="timer-circle">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="circle-bg" cx="110" cy="110" r="100"/>
        <circle class="circle-prog" id="prog-circle" cx="110" cy="110" r="100"/>
      </svg>
      <div class="timer-inner">
        <div class="timer-display" id="timer-display">01:00</div>
        <div class="timer-phase" id="timer-phase">جاهز؟</div>
      </div>
    </div>
  </div>

  <button class="start-btn" id="start-btn" onclick="toggleTimer()">ابدأ التحدي</button>

  <div class="task-card">
    <input type="text" id="task-input" placeholder="ماذا ستفعل الآن؟">
  </div>

  <div class="stats-card">
    <div class="stats-value" id="total-time">0 د</div>
    <p style="font-size: 0.8rem; color: var(--muted)">إجمالي وقت التركيز</p>
  </div>

  <!-- History -->
  <div class="history-card">
    <div class="history-header">
